<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WB Agent - Автобронирование поставок</title>

    <!--
      NOTE: We don't load telegram-web-app.js here.

      When running inside Telegram WebApp:
      - Telegram injects the script automatically
      - window.Telegram.WebApp becomes available

      When running in browser:
      - No script is loaded
      - App works in browser mode automatically
    -->

    <!-- Early Auth Detection Script -->
    <script>
      (function () {
        try {
          /**
           * Parse URL hash params manually (same logic as Telegram WebApp script)
           * URLSearchParams doesn't handle encoded JSON values well
           */
          function urlSafeDecode(urlencoded) {
            try {
              urlencoded = urlencoded.replace(/\+/g, '%20');
              return decodeURIComponent(urlencoded);
            } catch (e) {
              return urlencoded;
            }
          }

          function parseHashParams(locationHash) {
            var params = {};
            var hash = locationHash.replace(/^#/, '');

            if (!hash.length) {
              return params;
            }

            // Handle hash that might contain path?query format
            var qIndex = hash.indexOf('?');
            if (qIndex >= 0) {
              hash = hash.substr(qIndex + 1);
            }

            if (!hash.length) {
              return params;
            }

            var queryParams = hash.split('&');
            for (var i = 0; i < queryParams.length; i++) {
              var param = queryParams[i].split('=');
              var paramName = urlSafeDecode(param[0]);
              var paramValue =
                param[1] == null ? null : urlSafeDecode(param[1]);
              params[paramName] = paramValue;
            }
            return params;
          }

          // Parse URL params
          const urlParams = new URLSearchParams(window.location.search);
          const hashParams = parseHashParams(window.location.hash);
          // URL flag override
          const source = urlParams.get('source');
          const tgParam = urlParams.get('tg');
          const forceBrowserMode = source === 'browser' || tgParam === 'false';

          // Check for Telegram WebApp context via URL params
          // This works even when telegram-web-app.js is loaded dynamically
          // Telegram Mini Apps always include tgWebAppData in URL
          const hasInitDataInSearch = urlParams.has('tgWebAppData');
          const hasInitDataInHash = 'tgWebAppData' in hashParams;
          const hasInitDataInURL = hasInitDataInSearch || hasInitDataInHash;

          // Also check if Telegram object already exists (for static script loading)
          const tg = window.Telegram?.WebApp;
          const hasInitDataFromObject = Boolean(
            tg?.initData && tg.initData.length > 0,
          );

          const hasInitData = hasInitDataInURL || hasInitDataFromObject;

          // Determine mode based on URL params or Telegram object
          const isTelegram = !forceBrowserMode && hasInitData;

          // Set global flags (initData will be read by utility from URL or localStorage)
          window.__IS_TELEGRAM_WEBAPP__ = isTelegram;
          window.__FORCE_BROWSER_MODE__ = forceBrowserMode;
          window.__AUTH_MODE__ = isTelegram ? 'telegram' : 'browser';

          console.log('[Auth Detection]', {
            isTelegram,
            authMode: window.__AUTH_MODE__,
            hasInitData,
            hasInitDataInSearch,
            hasInitDataInHash,
            hasInitDataFromObject,
            hasTgObject: !!tg,
          });
        } catch (error) {
          console.error('[Auth Detection] Error:', error);
          window.__IS_TELEGRAM_WEBAPP__ = false;
          window.__FORCE_BROWSER_MODE__ = false;
          window.__AUTH_MODE__ = 'browser';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
