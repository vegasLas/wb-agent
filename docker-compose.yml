# ==========================================
# WB Agent - Docker Compose Configuration
# ==========================================
# For local development and testing

version: '3.8'

services:
  # ------------------------------------------
  # PostgreSQL Database
  # ------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: wb-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wbagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wbagent_secret}
      POSTGRES_DB: ${POSTGRES_DB:-wbagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wbagent} -d ${POSTGRES_DB:-wbagent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wb-agent-network

  # ------------------------------------------
  # Backend API Server
  # ------------------------------------------
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: production
    container_name: wb-agent-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql://wbagent:wbagent_secret@postgres:5432/wbagent?schema=public}
      
      # Server
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      
      # Security (REQUIRED - set these in .env file)
      COOKIE_ENCRYPTION_KEY: ${COOKIE_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # Telegram (optional)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      
      # Payments (optional)
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      
      # CORS
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      
      # WB API
      WB_API_BASE_URL: ${WB_API_BASE_URL:-https://seller-supply.wildberries.ru}
      
      # Proxy list (optional)
      PROXY_LIST: ${PROXY_LIST}
      
      # Monitoring cleanup
      RUN_MONITORING_CLEANUP: ${RUN_MONITORING_CLEANUP:-true}
      
      # Technical mode
      TECHNICAL_MODE_USER_IDS: ${TECHNICAL_MODE_USER_IDS}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      # Mount for persistent logs (optional)
      - backend_logs:/usr/src/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - wb-agent-network

  # ------------------------------------------
  # Optional: Redis for caching (future use)
  # ------------------------------------------
  # redis:
  #   image: redis:7-alpine
  #   container_name: wb-agent-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - wb-agent-network

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local
  # redis_data:
  #   driver: local

# ==========================================
# Networks
# ==========================================
networks:
  wb-agent-network:
    driver: bridge
